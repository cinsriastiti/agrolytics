<!DOCTYPE html>
<!-- pertanda bahwa file ini pakai HTML-->
<html lang="en">
<!-- kalau ini itu pakai bahasa inggris, bisa diubah ke bahasa indonesia jadi id-->
  
<head>
    <meta charset="UTF-8">
    <!-- ini buat semua karakter terbaca dengan benar -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- ini buat kompatibel dengan browser lama -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ini buat bisa responsive di hp juga -->
    <title>UI/UX</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <!-- ini buat terhubung ke file cssnya -->
</head>

<body>

    <!-- Bagian Home -->
    <header>
        <span class="material-symbols-outlined" id="menu-btn">
            menu
        </span>

        <a href="#" class="logo">
            <img src="images/logo.png" alt="logo">
        </a>

        <nav class="navbar">
            <a href="#home">HOME</a>
            <a href="#monitoring">MONITORING</a>
            <a href="#dashboard">DASHBOARD</a>
        </nav>

        <div class="search">
            <input class="srch" type="search" name="" placeholder="Type To Text">
            <a href="#"><button class="btn">Search</button></a>
        </div>
    </header>

    <!-- BAGIAN #HOME -->

    <section class="home" id="home">
        <div class="content">
            <a href="#" class="btn">Let's Get Started</a>
        </div>
    </section>

    <!-- bagian monitoring real time -->
    <section id="monitoring">
        <div class="monitor_data">
            <h1>Monitoring</h1>
            <div class="monitorr">
                <div id="monitor_map">
                    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
                        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
                </div>
                <canvas id="Chart_monitoring"></canvas>
            </div>
            <table id="table-monitor">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Lokasi</th>
                    </tr>
                </thead>
                <tbody id="data-monitor">
                </tbody>
            </table>
        </div>
        </div>


    </section>

    <!-- Bagian Dashboard -->
    <section id="dashboard">
        <div class="plant_insights">
            <h1>DASHBOARD</h1>
            <div class="table-container">
                <div class="rekomen">
                    <div id="map">
                        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
                            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
                    </div>
                    <div class="rekomendasi">
                        <div class="select-wrapper">
                            <p>Pilih Tanaman untuk Melihat Grafik</p>
                            <select onchange="showRekomendasiChart(this.value)">
                                <option value="">-- Pilih Tanaman --</option>
                                <option value="Tomat">Tomat</option>
                                <option value="Selada">Selada</option>
                                <option value="Cabai">Cabai</option>
                            </select>
                        </div>
                        <canvas id="Chart_rekomendasi"></canvas>
                    </div>
                </div>
                <table id="table-database">
                    <thead>
                        <tr>
                            <!-- <th class="count"></th> -->
                            <th>Lokasi</th>
                            <th>N (Nitrogen)</th>
                            <th>P (Phosfor)</th>
                            <th>K (Possasium)</th>
                            <th>pH</th>
                            <th>Suhu</th>
                            <th>Kelembaban</th>
                            <th>EC</th>
                            <th>Tanaman</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                    </tbody>
                </table>
            </div>
        </div>


    </section>



    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>

</body>

</html>
